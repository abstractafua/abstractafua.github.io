<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afua Frempong &#8212; Software Engineer</title>
    <meta name="description" content="Portfolio of Afua Frempong, an aspiring Software Engineer graduating from UBC in 2026." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // Load all JSX files in order, concatenate, then transpile + eval as one unit
      // so every component is defined before App.jsx references them.
      const files = [
        'src/components/Navbar.jsx',
        'src/sections/Hero.jsx',
        'src/sections/About.jsx',
        'src/sections/Experience.jsx',
        'src/sections/Projects.jsx',
        'src/sections/Designs.jsx',
        'src/sections/Photography.jsx',
        'src/sections/Contact.jsx',
        'src/App.jsx',
      ];

      Promise.all(files.map(f => fetch(f).then(r => r.text())))
        .then(sources => {
          const combined = sources.join('\n\n');
          const transpiled = Babel.transform(combined, { presets: ['react'] }).code;
          // eslint-disable-next-line no-eval
          eval(transpiled);
        })
        .catch(err => {
          console.error('Portfolio failed to load:', err);
          document.getElementById('root').innerHTML =
            '<p style="color:#e8a045;font-family:monospace;padding:2rem">Failed to load portfolio scripts. If running locally, please use a local server (e.g. VS Code Live Server extension).</p>';
        });
    </script>
  </body>
</html>
